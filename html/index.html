<!DOCTYPE HTML>
<html>
<head>
	<title>Flow</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-capable" content="yes">

	<link rel="stylesheet" href="flow.css">
</head>
<body>

	<div id="hud">
		<label>Name <input id="name-input" type="text" maxlength="20" placeholder="loading..."></label>
		<span class="own-score">Score: <b id="own-score">0</b></span>
		<span class="scores" id="scores"></span>
		<div class="music-player" id="music-player">
			<button id="music-prev" type="button" class="mp-btn" aria-label="Previous track" title="Previous track">⏮</button>
			<button id="music-toggle" type="button" class="mp-btn" aria-label="Play / pause" title="Play / pause">▶</button>
			<button id="music-next" type="button" class="mp-btn" aria-label="Next track" title="Next track">⏭</button>
			<span class="mp-track" id="music-track">—</span>
		</div>
	</div>

	<div id="playfield"></div>

	<div id="gameover" hidden>
		<div class="panel">
			<h1>Game Over</h1>
			<p class="reason" id="gameover-reason"></p>
			<p class="final-score">Score: <b id="gameover-score">0</b></p>
			<button id="gameover-restart" type="button">New Game</button>
		</div>
	</div>

	<div id="welcome" hidden>
		<div class="panel">
			<h1>Flow</h1>
			<p>A multiplayer snake game. Pick an alias to start.</p>
			<form id="welcome-form">
				<input id="welcome-name" type="text" maxlength="20" placeholder="Your name" autofocus>
				<button type="submit">Start</button>
			</form>
		</div>
	</div>

	<script src="js/worm.js"></script>
	<script src="js/food.js"></script>
	<script src="js/field.js"></script>
	<script src="js/hud.js"></script>
	<script src="js/sounds.js"></script>
	<script src="js/game.js"></script>
	<script>game.init()</script>

</body>
</html>
